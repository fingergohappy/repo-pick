name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build release assets
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        id: release
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag must look like v0.1.0" >&2
            exit 1
          fi
          echo "tag=${tag}" >>"${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >>"${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build binaries
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          targets=(
            "darwin arm64"
            "darwin amd64"
            "linux arm64"
            "linux amd64"
          )
          for target in "${targets[@]}"; do
            read -r goos goarch <<<"${target}"
            workdir="$(mktemp -d)"
            asset="repo-pick_${VERSION}_${goos}_${goarch}.tar.gz"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build \
              -trimpath \
              -ldflags="-s -w -buildid= -X main.version=${VERSION}" \
              -o "${workdir}/repo-pick" \
              ./cmd/repo-pick
            tar -C "${workdir}" -czf "dist/${asset}" repo-pick
            rm -rf "${workdir}"
          done
          (cd dist && sha256sum *.tar.gz > checksums.txt)

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/*.tar.gz dist/checksums.txt --clobber
          else
            gh release create "${TAG}" dist/*.tar.gz dist/checksums.txt \
              --title "${TAG}" \
              --notes "repo-pick ${TAG}"
          fi

  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: build
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    steps:
      - name: Check tap token
        id: tap-token
        run: |
          if [[ -n "${TAP_TOKEN}" ]]; then
            echo "enabled=true" >>"${GITHUB_OUTPUT}"
          else
            echo "HOMEBREW_TAP_TOKEN is not set; skipping tap update"
            echo "enabled=false" >>"${GITHUB_OUTPUT}"
          fi

      - name: Resolve tag
        id: release
        if: steps.tap-token.outputs.enabled == 'true'
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >>"${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >>"${GITHUB_OUTPUT}"

      - name: Checkout source
        if: steps.tap-token.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}
          path: source

      - name: Checkout Homebrew tap
        if: steps.tap-token.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: fingergohappy/homebrew-tap
          token: ${{ env.TAP_TOKEN }}
          path: homebrew-tap

      - name: Download release artifact
        if: steps.tap-token.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Update formula
        if: steps.tap-token.outputs.enabled == 'true'
        run: |
          bash source/scripts/update-homebrew-formula.sh \
            "${{ steps.release.outputs.version }}" \
            dist/checksums.txt \
            homebrew-tap

      - name: Commit formula
        if: steps.tap-token.outputs.enabled == 'true'
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/repo-pick.rb
          if git diff --cached --quiet; then
            echo "formula already up to date"
            exit 0
          fi
          git commit -m "repo-pick ${{ steps.release.outputs.tag }}"
          git push
